name: Feature Request
description: Suggest a new role, skill, or enhancement for RUDR9
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature suggestion! Please search existing issues first to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why would this feature be useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you imagine this working? (Optional, but helpful)

  - type: dropdown
    id: type
    attributes:
      label: Type of Feature
      options:
        - New agent role (SOUL.md + toolset)
        - New skill for existing role
        - Installer improvement
        - Guard plugin enhancement
        - Hook / monitoring
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else relevant? Mockups, examples from other projects, etc.